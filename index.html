<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fitness Tracker Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-100 min-h-screen font-sans antialiased selection:bg-emerald-500/30 selection:text-emerald-300">

    <div class="max-w-6xl mx-auto p-4 md:p-8 space-y-6">
        
        <!-- Premium Glowing Header Block -->
        <header class="relative overflow-hidden bg-gradient-to-r from-emerald-600 via-emerald-500 to-teal-600 rounded-2xl p-6 md:p-8 shadow-2xl shadow-emerald-950/20 border border-emerald-400/20">
            <div class="relative z-10">
                <h1 class="text-3xl md:text-4xl font-black tracking-tight text-white drop-shadow-sm flex items-center gap-3">
                    <span>⚡</span> AI Fitness Tracker
                </h1>
                <p class="text-emerald-500 bg-white/90 font-semibold px-2.5 py-0.5 rounded-md inline-block text-xs uppercase tracking-wider mt-2 shadow-sm border border-emerald-100">Live Dashboard Connection</p>
            </div>
            <!-- Decorative Abstract Vector Background Blur -->
            <div class="absolute right-0 bottom-0 top-0 w-80 bg-white/10 blur-2xl rounded-full translate-x-10 translate-y-10 pointer-events-none"></div>
        </header>

        <!-- Main Workspace Configuration -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
            
            <!-- Left Grid Layout Pillar: Modernized Data Logging Panel -->
            <section class="bg-[#1e293b] border border-slate-750/70 p-6 rounded-2xl shadow-xl backdrop-blur-md ring-1 ring-slate-700/50">
                <h2 class="text-lg font-bold text-emerald-400 mb-4 flex items-center gap-2 tracking-wide">
                    <span>✏️</span> Log New Nutrition Entry
                </h2>
                
                <form id="fForm" onsubmit="saveData(event)" class="space-y-4">
                    <!-- Raw Input Textarea Block -->
                    <div>
                        <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5" for="rawInput">What did you eat?</label>
                        <textarea id="rawInput" name="rawInput" rows="2" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl py-2.5 px-4 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all text-sm resize-none shadow-inner" placeholder="e.g., 3 chapatis + dal, 2 eggs" required></textarea>
                    </div>

                    <!-- Supplemental Parameter Categories -->
                    <div>
                        <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5" for="parsedFoods">Meal Classification</label>
                        <input id="parsedFoods" name="parsedFoods" type="text" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl py-2.5 px-4 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all text-sm shadow-inner" placeholder="e.g., Breakfast, Lunch">
                    </div>

                    <!-- Target Value Row Inputs -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5" for="calories">Calories (kcal)</label>
                            <input id="calories" name="calories" type="number" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl py-2.5 px-4 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all text-sm font-semibold text-amber-400 shadow-inner" placeholder="600" required>
                        </div>
                        <div>
                            <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5" for="protein">Protein (g)</label>
                            <input id="protein" name="protein" type="number" step="0.1" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl py-2.5 px-4 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all text-sm font-semibold text-teal-400 shadow-inner" placeholder="15" required>
                        </div>
                    </div>

                    <!-- Modern Interactive Core Button -->
                    <button type="submit" id="sBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-[0.98] text-white font-bold py-3 px-4 rounded-xl transition-all duration-150 focus:outline-none focus:ring-4 focus:ring-emerald-900/50 text-sm shadow-lg shadow-emerald-950/40 mt-2 tracking-wide uppercase">
                        Log Meal Entry
                    </button>
                </form>
                
                <!-- Status Notifications Block Container -->
                <div id="alert" class="mt-4 p-3 rounded-xl text-xs font-semibold text-center border hidden transition-all duration-300"></div>
            </section>

            <!-- Right Grid Layout Pillar: The Polished History Data Timeline Sheet -->
            <section class="lg:col-span-2 bg-[#1e293b] border border-slate-750/70 p-6 rounded-2xl shadow-xl backdrop-blur-md ring-1 ring-slate-700/50 flex flex-col min-h-[480px]">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b border-slate-700/60 pb-4 mb-4 gap-4">
                    <h2 class="text-lg font-bold text-teal-400 flex items-center gap-2 tracking-wide">
                        <span>📊</span> Historical Logs & Entries
                    </h2>
                </div>

                <!-- Async Network Loader Spinner Element -->
                <div id="loader" class="flex flex-col items-center justify-center my-auto py-16 text-slate-400 space-y-3">
                    <div class="animate-spin rounded-full h-9 w-9 border-b-2 border-teal-400"></div>
                    <p class="text-xs font-medium tracking-wide animate-pulse">Synchronizing database metrics...</p>
                </div>

                <!-- Polished Data Table Framework Wrapper -->
                <div id="tDiv" class="overflow-x-auto flex-1 hidden rounded-xl border border-slate-700/70">
                    <table class="w-full text-left text-sm border-collapse">
                        <thead>
                            <tr class="bg-[#0f172a] text-slate-400 font-semibold text-xs border-b border-slate-700 uppercase tracking-wider">
                                <th class="py-3.5 px-4 w-1/4">Date & Time</th>
                                <th class="py-3.5 px-4 w-1/2">Food Entry / Details</th>
                                <th class="py-3.5 px-4 text-right w-1/8">Calories</th>
                                <th class="py-3.5 px-4 text-right w-1/8">Protein</th>
                            </tr>
                        </thead>
                        <tbody id="rows" class="divide-y divide-slate-700/40 bg-[#1e293b]/30">
                            <!-- Dynamic Layout Rows Built Asynchronously via Script Exec Blocks Below -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzuiFZ1pzFhYyx5DQOrRbaM-pSpA1GvFpnS7dkruwc19VjJToM05bGM7wQi8DdNDwEfsA/exec";

        document.addEventListener("DOMContentLoaded", loadData);

        /**
         * Cleans ISO timestamps and structures historical items gracefully
         */
        function formatDisplayDate(dateStr, rawTime) {
            if (!dateStr) return "—";
            try {
                // Parse standard date string configurations
                const baseDate = dateStr.includes('T') ? new Date(dateStr) : new Date(dateStr.replace(/-/g, '/'));
                if (isNaN(baseDate.getTime())) return dateStr;
                
                const prettyDate = baseDate.toLocaleDateString('en-IN', {
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric'
                });

                // Check for hidden placeholder times
                let displayTime = "";
                if (rawTime && rawTime !== "00:00:00") {
                    displayTime = `<span class="text-slate-500 text-[10px] block mt-0.5 font-normal">${rawTime}</span>`;
                }

                return `<span class="font-semibold text-slate-300">${prettyDate}</span>${displayTime}`;
            } catch(e) {
                return dateStr;
            }
        }

        async function loadData() {
            try {
                const r = await fetch(WEB_APP_URL);
                const res = await r.json();
                if(res.status === "success") {
                    document.getElementById("loader").classList.add("hidden");
                    document.getElementById("tDiv").classList.remove("hidden");
                    const tbody = document.getElementById("rows");
                    
                    // Render newest tracking logs on top
                    tbody.innerHTML = res.data.reverse().map(row => {
                        const calValue = Number(row["Calories"]) || 0;
                        const proValue = Number(row["Protein"]) || 0;
                        const rawTime = row["Time"] || "";

                        return `
                            <tr class="hover:bg-slate-800/60 transition-colors group">
                                <td class="py-3.5 px-4 text-xs font-mono tracking-tight border-r border-slate-700/20">${formatDisplayDate(row["Date"], rawTime)}</td>
                                <td class="py-3.5 px-4 font-medium text-slate-200 text-sm group-hover:text-white transition-colors">${row["Raw Input"] || "—"}</td>
                                <td class="py-3.5 px-4 text-right font-bold text-amber-400 font-mono text-xs whitespace-nowrap bg-amber-500/5 rounded-lg">${calValue.toLocaleString()} <span class="text-[10px] text-amber-500/70 font-normal">kcal</span></td>
                                <td class="py-3.5 px-4 text-right font-bold text-teal-400 font-mono text-xs whitespace-nowrap bg-teal-500/5 rounded-lg">${proValue.toFixed(1)} <span class="text-[10px] text-teal-500/70 font-normal">g</span></td>
                            </tr>
                        `;
                    }).join("");
                }
            } catch(e) {
                document.getElementById("loader").innerHTML = `<div class="text-rose-400 font-semibold text-xs border border-rose-900/50 bg-rose-950/30 p-4 rounded-xl">⚠ Live sync failed. Check Google Cloud Web App deployment restrictions.</div>`;
            }
        }

        async function saveData(e) {
            e.preventDefault();
            const btn = document.getElementById("sBtn");
            const box = document.getElementById("alert");
            btn.disabled = true; 
            btn.innerText = "Processing Transmission...";
            box.classList.add("hidden");

            const urlEncodedData = new URLSearchParams();
            urlEncodedData.append("rawInput", document.getElementById("rawInput").value);
            urlEncodedData.append("parsedFoods", document.getElementById("parsedFoods").value);
            urlEncodedData.append("calories", document.getElementById("calories").value);
            urlEncodedData.append("protein", document.getElementById("protein").value);

            try {
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: urlEncodedData.toString()
                });
                
                box.className = "mt-4 p-3 rounded-xl text-xs font-bold text-center bg-emerald-950/80 text-emerald-300 border border-emerald-800 shadow-md";
                box.innerText = "✓ Nutrition log appended to Google Sheet database successfully!";
                box.classList.remove("hidden");
                document.getElementById("fForm").reset();
                
                // Triggers structural synchronization update
                setTimeout(loadData, 2000);
            } catch(err) {
                box.className = "mt-4 p-3 rounded-xl text-xs font-bold text-center bg-rose-950/80 text-rose-300 border border-rose-800 shadow-md";
                box.innerText = "⚠ Network processing fault encountered. Try again.";
                box.classList.remove("hidden");
            } finally {
                btn.disabled = false; 
                btn.innerText = "Log Meal Entry";
            }
        }
    </script>
</body>
</html>
