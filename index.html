<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Workspace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Authentication Screen -->
    <div id="authScreen" class="auth-wrapper">
        <div class="auth-panel">
            <h2>✦ Aura</h2>
            <p style="color: var(--secondary-txt); margin-top: 4px; font-size: 14px;">Sign in to your dashboard</p>
            <div class="auth-fields">
                <input type="text" id="authUsername" placeholder="Username">
                <input type="password" id="authPassword" placeholder="Password">
                <button id="loginBtn" class="btn-primary">Sign In</button>
                <button id="guestBtn" class="btn-secondary">Enter as Guest</button>
            </div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="mainDashboard" class="workspace-root" style="display: none;">
        
        <!-- Sidebar Navigation -->
        <aside class="side-navigation">
            <div class="side-top">
                <div class="side-logo">
                    <span class="logo-icon">✦</span><span>Aura</span>
                </div>
                <nav class="nav-links">
                    <button class="nav-item active">⌂ Home</button>
                </nav>
            </div>

            <!-- Notepad Notes -->
            <div class="sidebar-notepad-block">
                <div class="sidebar-notepad-header">
                    <span>DAILY NOTES</span>
                    <span class="save-status" id="memoStatus">Saved</span>
                </div>
                <textarea id="dashboardMemo" placeholder="Type notes..." class="sidebar-notepad-textarea"></textarea>
            </div>

            <!-- Safe Bottom Meta with Logout Trigger -->
            <div class="side-bottom">
                <div class="user-meta">
                    <div class="avatar-thumb" id="userDisplay">A</div>
                    <button id="logoutBtn" class="btn-icon-logout">Logout</button>
                </div>
            </div>
        </aside>

        <!-- Main Dashboard View -->
        <main class="content-container">
            <div class="view-filter-segment-bar">
                <div class="segment-pills">
                    <button class="pill-btn active">Daily</button>
                    <button class="pill-btn">Weekly</button>
                    <button class="pill-btn">Monthly</button>
                </div>
                <input type="date" id="historyDatePicker" class="custom-date-ui">
            </div>

            <div class="split-workspace-grid">
                <div class="workspace-left-column">
                    
                    <!-- Text Box -->
                    <section class="log-input-card">
                        <div class="log-input-group">
                            <textarea id="meal" placeholder="Track breakfast, lunch, or snack details..."></textarea>
                            <div class="log-input-controls">
                                <button id="voiceBtn" class="btn-voice-trigger">🎤 Speak</button>
                                <button id="logBtn" class="btn-action-submit">Log Meal</button>
                            </div>
                        </div>
                    </section>

                    <!-- Synced Linear Gauges -->
                    <section class="macro-gauge-card">
                        <div class="card-header-minimal"><h3>Daily Progress Matrix</h3></div>
                        <div class="linear-metrics-grid">
                            <div>
                                <div class="metric-info-row">
                                    <span class="calories-row-label">Calories Target</span>
                                    <span class="metric-value-display"><strong id="todayCalories">3623</strong> / 2000 kcal</span>
                                </div>
                                <div class="progress-bar-track">
                                    <div id="calorieBarFill" class="progress-fill fill-calories" style="width: 85%;"></div>
                                </div>
                            </div>
                            <div>
                                <div class="metric-info-row">
                                    <span class="protein-row-label">Protein Target</span>
                                    <span class="metric-value-display"><strong id="todayProtein">98.7</strong> / 120 g</span>
                                </div>
                                <div class="progress-bar-track">
                                    <div id="proteinBarFill" class="progress-fill fill-protein" style="width: 70%;"></div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="workspace-right-column">
                    <section class="companion-window">
                        <div class="avatar-character-box">✨</div>
                        <div class="companion-speech-bubble">
                            <h3 class="character-title">Aura AI</h3>
                            <p>Ready to target today's metrics.</p>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
