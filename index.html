<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Database Log</title>
    <!-- Tailwind CSS for sleek styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-lg border border-slate-700">
        <div class="mb-6">
            <h2 class="text-3xl font-extrabold text-white tracking-tight">Radio Station Log</h2>
            <p class="text-sm text-slate-400 mt-1">Submit historical logs directly to your Google Sheet.</p>
        </div>
        
        <form id="radioLogForm" onsubmit="submitForm(event)" class="space-y-4">
            <!-- Station Name -->
            <div>
                <label class="block text-slate-300 text-sm font-semibold mb-1" for="stationName">Station Name / ID</label>
                <input class="w-full bg-slate-700 border border-slate-600 rounded-lg py-2.5 px-4 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" 
                       id="stationName" type="text" placeholder="e.g. WXPN" required>
            </div>

            <!-- Frequency -->
            <div>
                <label class="block text-slate-300 text-sm font-semibold mb-1" for="frequency">Frequency</label>
                <input class="w-full bg-slate-700 border border-slate-600 rounded-lg py-2.5 px-4 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" 
                       id="frequency" type="text" placeholder="e.g. 88.5 FM" required>
            </div>

            <!-- Host/DJ Name -->
            <div>
                <label class="block text-slate-300 text-sm font-semibold mb-1" for="hostName">Host / DJ Name</label>
                <input class="w-full bg-slate-700 border border-slate-600 rounded-lg py-2.5 px-4 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" 
                       id="hostName" type="text" placeholder="e.g. Helen Leicht">
            </div>

            <!-- Comments / Notes -->
            <div>
                <label class="block text-slate-300 text-sm font-semibold mb-1" for="comments">Historical Notes / Comments</label>
                <textarea class="w-full bg-slate-700 border border-slate-600 rounded-lg py-2.5 px-4 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" 
                          id="comments" rows="3" placeholder="Add historical context, genres played, active years..."></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 focus:outline-none focus:ring-4 focus:ring-indigo-800">
                Log to Google Sheet
            </button>
        </form>

        <!-- Dynamic Status Alerts -->
        <div id="alertBox" class="mt-4 p-4 rounded-lg text-sm text-center font-medium hidden"></div>
    </div>

    <script>
        // Your specific deployed endpoint URL
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzuiFZ1pzFhYyx5DQOrRbaM-pSpA1GvFpnS7dkruwc19VjJToM05bGM7wQi8DdNDwEfsA/exec";

        async function submitForm(event) {
            event.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('alertBox');
            
            // Set Loading UI state
            submitBtn.disabled = true;
            submitBtn.innerText = "Transmitting to Google Sheets...";
            submitBtn.className = "w-full bg-slate-600 text-slate-400 font-bold py-3 px-4 rounded-lg cursor-not-allowed";
            alertBox.classList.add('hidden');

            // Gather inputs
            const payload = {
                stationName: document.getElementById('stationName').value,
                frequency: document.getElementById('frequency').value,
                hostName: document.getElementById('hostName').value || "N/A",
                comments: document.getElementById('comments').value || ""
            };

            try {
                // Sending text/plain is a clever trick that prevents the browser from doing a CORS preflight check,
                // avoiding any annoying cross-origin request blocks.
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.result === 'success') {
                    alertBox.className = "mt-4 p-4 rounded-lg text-sm text-center font-medium bg-emerald-950/50 text-emerald-300 border border-emerald-800";
                    alertBox.innerText = "✓ Record appended to Google Sheet!";
                    document.getElementById('radioLogForm').reset();
                } else {
                    throw new Error(result.error || "Unknown server error");
                }

            } catch (error) {
                console.error("Transmission Failure:", error);
                alertBox.className = "mt-4 p-4 rounded-lg text-sm text-center font-medium bg-rose-950/50 text-rose-300 border border-rose-800";
                alertBox.innerText = "Error: " + error.message;
            } finally {
                // Reset Button UI state
                submitBtn.disabled = false;
                submitBtn.innerText = "Log to Google Sheet";
                submitBtn.className = "w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 focus:outline-none focus:ring-4 focus:ring-indigo-800";
                alertBox.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
