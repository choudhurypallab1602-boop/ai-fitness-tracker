<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="authScreen" class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Aura <span class="pro-badge">PRO</span></h1>
                <p>Sign in to access your dashboard.</p>
            </div>
            <div class="auth-form">
                <input type="text" id="authUsername" placeholder="Username">
                <input type="password" id="authPassword" placeholder="Password">
                <button id="loginBtn" class="btn-black">Sign In</button>
                <div class="auth-divider"><span>OR</span></div>
                <button id="guestBtn" class="btn-guest">⚡ Enter as Guest</button>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="mainDashboard" class="app-container" style="display: none;">
        <div id="guestBanner" class="guest-alert-banner" style="display: none;">
            ⚠️ Guest Mode Active (Data not synced).
        </div>

        <header class="main-header">
            <div class="header-brand">
                <h2>Aura <span class="pro-badge">PRO</span></h2>
                <p>Logged in as: <span id="userDisplay" style="font-weight:700;">User</span></p>
            </div>
            <button id="logoutBtn" class="btn-logout">Logout 🚪</button>
        </header>

        <section class="card input-card">
            <div class="input-wrapper">
                <textarea id="meal" placeholder="Describe your meal..." rows="1"></textarea>
                <div class="input-actions">
                    <button id="voiceBtn" class="btn-voice">🎤 Speak</button>
                    <button id="logBtn" class="btn-black-log">Log Meal</button>
                </div>
            </div>
            <div id="loading" class="spinner-container" style="display: none; text-align: center; margin-top: 10px;">
                <small style="color: #666;">Processing request...</small>
            </div>
        </section>

        <!-- Tabs Navigation -->
        <div class="navigation-bar">
            <nav class="range-navigation">
                <button id="todayTabBtn" class="tab-btn active">Today</button>
                <button id="weekTabBtn" class="tab-btn">This Week</button>
                <button id="monthTabBtn" class="tab-btn">This Month</button>
            </nav>
            <input type="date" id="historyDatePicker">
        </div>

        <main class="interaction-layout">
            <div class="left-column">
                <section class="card metrics-card">
                    <h3 id="metricsTitle">Daily Progress</h3>
                    <div class="metric-row">
                        <div class="metric-labels">
                            <span>Calories</span>
                            <span id="todayCalories" class="metric-value">0 / 2000 kcal</span>
                        </div>
                        <div class="progress-bar-wrapper">
                            <div id="calorieBar" class="progress-fill"></div>
                        </div>
                    </div>
                    <div class="metric-row">
                        <div class="metric-labels">
                            <span>Protein</span>
                            <span id="todayProtein" class="metric-value">0 / 120 g</span>
                        </div>
                        <div class="progress-bar-wrapper">
                            <div id="proteinBar" class="progress-fill"></div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="right-column">
                <section class="card coach-section">
                    <div class="coach-header">
                        <span class="info-icon">ⓘ</span>
                        <h3>AI Coach</h3>
                    </div>
                    <div id="coach" class="coach-text">Ready to analyze.</div>
                </section>
                <section class="card timeline-card">
                    <h3>Timeline Feed</h3>
                    <div class="timeline"></div>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
