<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fitness Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6">
    <div class="max-w-4xl mx-auto space-y-6">
        <header class="bg-emerald-600 p-6 rounded-xl shadow-lg">
            <h1 class="text-2xl font-bold">AI Fitness Tracker Log</h1>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Input Form Section -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 h-fit">
                <h2 class="text-lg font-bold text-emerald-400 mb-4">Add Meal</h2>
                <form id="fForm" onsubmit="saveData(event)" class="space-y-3">
                    <input id="rawInput" name="rawInput" type="text" placeholder="What did you eat?" class="w-full bg-slate-700 p-2 rounded text-sm text-white" required>
                    <input id="parsedFoods" name="parsedFoods" type="text" placeholder="Meal type (e.g. Lunch)" class="w-full bg-slate-700 p-2 rounded text-sm text-white">
                    <input id="calories" name="calories" type="number" placeholder="Calories" class="w-full bg-slate-700 p-2 rounded text-sm text-white" required>
                    <input id="protein" name="protein" type="number" step="0.1" placeholder="Protein (g)" class="w-full bg-slate-700 p-2 rounded text-sm text-white" required>
                    <button type="submit" id="sBtn" class="w-full bg-emerald-600 py-2 rounded font-bold text-sm text-white hover:bg-emerald-500 transition-colors">Log Meal</button>
                </form>
                <div id="alert" class="mt-3 p-2 text-xs text-center rounded hidden"></div>
            </div>

            <!-- Historical View Section -->
            <div class="md:col-span-2 bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h2 class="text-lg font-bold text-teal-400 mb-4">History Log</h2>
                <div id="loader" class="text-center py-8 text-sm text-slate-400">Loading spreadsheet entries...</div>
                <div id="tDiv" class="overflow-x-auto hidden">
                    <table class="w-full text-left text-xs border-collapse">
                        <thead>
                            <tr class="border-b border-slate-700 text-slate-400 font-bold bg-slate-850">
                                <th class="p-2">Date</th>
                                <th class="p-2">Food Input</th>
                                <th class="p-2 text-right">Calories</th>
                                <th class="p-2 text-right">Protein</th>
                            </tr>
                        </thead>
                        <tbody id="rows"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Paste your newly generated Web App URL here
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzuiFZ1pzFhYyx5DQOrRbaM-pSpA1GvFpnS7dkruwc19VjJToM05bGM7wQi8DdNDwEfsA/exec";

        document.addEventListener("DOMContentLoaded", loadData);

        async function loadData() {
            try {
                const r = await fetch(WEB_APP_URL);
                const res = await r.json();
                if(res.status === "success") {
                    document.getElementById("loader").classList.add("hidden");
                    document.getElementById("tDiv").classList.remove("hidden");
                    const tbody = document.getElementById("rows");
                    
                    // Display latest records on top
                    tbody.innerHTML = res.data.reverse().map(row => `
                        <tr class="border-b border-slate-700/50 hover:bg-slate-750">
                            <td class="p-2 text-slate-400 whitespace-nowrap">${row["Date"] || ""}</td>
                            <td class="p-2 font-medium text-slate-200">${row["Raw Input"] || ""}</td>
                            <td class="p-2 text-right text-amber-400 font-bold font-mono">${row["Calories"]} kcal</td>
                            <td class="p-2 text-right text-teal-400 font-bold font-mono">${row["Protein"]}g</td>
                        </tr>
                    `).join("");
                }
            } catch(e) {
                document.getElementById("loader").innerText = "Failed to load data. Verify Web App deployment configuration.";
            }
        }

        async function saveData(e) {
            e.preventDefault();
            const btn = document.getElementById("sBtn");
            const box = document.getElementById("alert");
            btn.disabled = true; btn.innerText = "Saving...";
            box.classList.add("hidden");

            // Build a regular form URL payload to ensure it passes through all firewalls without a 400 error
            const urlEncodedData = new URLSearchParams();
            urlEncodedData.append("rawInput", document.getElementById("rawInput").value);
            urlEncodedData.append("parsedFoods", document.getElementById("parsedFoods").value);
            urlEncodedData.append("calories", document.getElementById("calories").value);
            urlEncodedData.append("protein", document.getElementById("protein").value);

            try {
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: urlEncodedData.toString()
                });
                
                box.className = "mt-3 p-2 text-xs text-center rounded bg-emerald-950 text-emerald-300 border border-emerald-800";
                box.innerText = "Meal logged successfully! Updates will sync shortly.";
                box.classList.remove("hidden");
                document.getElementById("fForm").reset();
                
                // Reload historical timeline view to reflect changes
                setTimeout(loadData, 2000);
            } catch(err) {
                box.className = "mt-3 p-2 text-xs text-center rounded bg-rose-950 text-rose-300 border border-rose-800";
                box.innerText = "Network transmission error.";
                box.classList.remove("hidden");
            } finally {
                btn.disabled = false; btn.innerText = "Log Meal";
            }
        }
    </script>
</body>
</html>
