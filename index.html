<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura // Intuitive Fitness & Meal Tracking</title>
  <style>
    :root {
      --bg-base: #0a0b10;
      --bg-surface: #121420;
      --bg-card: #1a1d30;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-primary: #6366f1;
      --accent-hover: #4f46e5;
      --accent-success: #10b981;
      --accent-danger: #ef4444;
      --border-color: #2a2f45;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-base: #f9fafb;
        --bg-surface: #ffffff;
        --bg-card: #f3f4f6;
        --text-main: #111827;
        --text-muted: #6b7280;
        --accent-primary: #4f46e5;
        --accent-hover: #4338ca;
        --accent-success: #059669;
        --accent-danger: #dc2626;
        --border-color: #e5e7eb;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-base);
      color: var(--text-main);
      min-height: 100vh;
      padding: 2rem 1rem;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      background: linear-gradient(to right, var(--accent-primary), #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    .panel {
      background-color: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    input[type="text"], input[type="date"], input[type="time"], textarea {
      width: 100%;
      background-color: var(--bg-base);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s ease;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent-primary);
    }

    .tracker-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    @media (min-width: 768px) {
      .tracker-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-size: 0.9rem;
      font-weight: 600;
    }

    textarea {
      height: 120px;
      resize: none;
      margin-bottom: 1rem;
    }

    button {
      background-color: var(--accent-primary);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.2s ease;
    }

    button:hover {
      background-color: var(--accent-hover);
    }

    .metrics-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .metric-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
    }

    .metric-card .value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent-primary);
    }

    .metric-card .label {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 0.25rem;
    }

    .timeline-card {
      background-color: var(--bg-card);
      border-left: 4px solid var(--accent-primary);
      border-top: 1px solid var(--border-color);
      border-right: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
      border-radius: 0 12px 12px 0;
      padding: 1rem;
      position: relative;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
    }

    .card-time {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    .badge {
      background-color: rgba(16, 185, 129, 0.15);
      color: var(--accent-success);
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: 9999px;
      font-weight: 700;
    }

    .card-raw {
      font-style: italic;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }

    .card-parsed {
      font-weight: 500;
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
    }

    .card-macros {
      display: flex;
      gap: 1rem;
      font-size: 0.85rem;
    }

    .card-macros span strong {
      color: var(--text-main);
    }

    .btn-delete {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: transparent;
      color: var(--accent-danger);
      width: auto;
      padding: 0.25rem;
      font-size: 0.85rem;
    }
    .btn-delete:hover {
      background: rgba(239, 68, 68, 0.1);
    }

    .spinner-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(10, 11, 16, 0.75);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(4px);
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--border-color);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 2rem 0;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="spinner-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <div class="container">
    <header>
      <h1>AURA</h1>
      <p>Secure Fitness & Meal Analytical Log Matrix</p>
    </header>

    <div class="tracker-grid">
      <!-- Logger Management Panel -->
      <div class="panel">
        <div class="form-row">
          <div class="form-group">
            <label for="logDate">Target Logging Date</label>
            <input type="date" id="logDate" onchange="renderDayView()">
          </div>
          <div class="form-group">
            <label for="logTime">Logging Time</label>
            <input type="time" id="logTime">
          </div>
        </div>

        <div class="form-group">
          <label for="mealInput">What did you eat?</label>
          <textarea id="mealInput" placeholder="Describe naturally: e.g., '2 rotis, 60g muri with 30g chanachur, and an egg pouch'"></textarea>
        </div>
        <button onclick="logMeal()">Analyze & Process Log</button>
      </div>

      <!-- Historical Analytic Display Console -->
      <div class="panel">
        <div class="metrics-summary">
          <div class="metric-card">
            <div class="value" id="dayCalories">0</div>
            <div class="label">Total Calories (kcal)</div>
          </div>
          <div class="metric-card">
            <div class="value" id="dayProtein">0</div>
            <div class="label">Total Protein (g)</div>
          </div>
        </div>

        <h3 style="margin-bottom: 1rem; font-size: 1.1rem;">Activity Log Timeline</h3>
        <div class="timeline" id="timelineContainer">
          <div class="empty-state">No nutritional matrices indexed for this date parameter.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // HARDCODED BACKEND INTERACTION GATEWAY
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzSN3RB8f2VhN0p8QbQ7VcQ-dsghvDhkfHsgI7eyzSm2TobCHjLBmCmYGG6hu-krijyqg/exec";
    
    // Global Memory Cache Architecture
    let datasetMatrix = [];

    // Initialize application settings on page mount
    window.addEventListener("DOMContentLoaded", () => {
      // Raw string parsing for dates to prevent browser-native timezone offsets
      const rawNow = new Date();
      const yr = rawNow.getFullYear();
      const mo = String(rawNow.getMonth() + 1).padStart(2, '0');
      const dy = String(rawNow.getDate()).padStart(2, '0');
      
      document.getElementById("logDate").value = `${yr}-${mo}-${dy}`;
      document.getElementById("logTime").value = String(rawNow.getHours()).padStart(2, '0') + ":" + String(rawNow.getMinutes()).padStart(2, '0');

      fetchHistory();
    });

    function toggleLoader(show) {
      document.getElementById("loadingOverlay").style.display = show ? "flex" : "none";
    }

    /**
     * Network Action: Fetch entire data record matrix from sheet
     */
    async function fetchHistory() {
      toggleLoader(true);
      try {
        const response = await fetch(BACKEND_URL);
        const data = await response.json();
        
        if (data.status === "success") {
          datasetMatrix = data.history || [];
          renderDayView();
        } else {
          alert("Backend Error: " + data.message);
        }
      } catch (err) {
        console.error(err);
        alert("Network communication failure mapping historical metrics.");
      } finally {
        toggleLoader(false);
      }
    }

    /**
     * Network Action: Package raw input data and commit to sheet database
     */
    async function logMeal() {
      const mealText = document.getElementById("mealInput").value.trim();
      const targetDate = document.getElementById("logDate").value;
      const targetTime = document.getElementById("logTime").value;

      if (!mealText) {
        alert("Please explicitly describe your dietary intake before executing analysis.");
        return;
      }

      toggleLoader(true);
      try {
        const parameters = new URLSearchParams({
          date: targetDate,
          time: targetTime,
          meal: mealText
        });

        const response = await fetch(`${BACKEND_URL}?${parameters.toString()}`);
        const data = await response.json();

        if (data.status === "success") {
          datasetMatrix = data.history || [];
          document.getElementById("mealInput").value = ""; 
          renderDayView();
        } else {
          alert("Verification Error: " + data.message);
        }
      } catch (err) {
        console.error(err);
        alert("Network pipeline interrupted posting structured metrics.");
      } finally {
        toggleLoader(false);
      }
    }

    /**
     * Network Action: Target specific sheet indices for execution deletion processing
     */
    async function deleteMeal(rowIdx) {
      if (!confirm("Confirm item extraction from historical sheet metrics?")) return;

      toggleLoader(true);
      try {
        const response = await fetch(`${BACKEND_URL}?action=delete&row=${rowIdx}`);
        const data = await response.json();

        if (data.status === "success") {
          datasetMatrix = data.history || [];
          renderDayView();
        } else {
          alert("Extraction Error: " + data.message);
        }
      } catch (err) {
        console.error(err);
        alert("Network failure processing operational request.");
      } finally {
        toggleLoader(false);
      }
    }

    /**
     * Pure UI View Component Render Engine Loop
     */
    function renderDayView() {
      const activeDate = document.getElementById("logDate").value; 
      const container = document.getElementById("timelineContainer");
      
      const dailyRecords = datasetMatrix.filter(item => item.date === activeDate);

      let totalCal = 0;
      let totalProt = 0;

      if (dailyRecords.length === 0) {
        container.innerHTML = `<div class="empty-state">No nutritional matrices indexed for ${activeDate}.</div>`;
        document.getElementById("dayCalories").textContent = "0";
        document.getElementById("dayProtein").textContent = "0";
        return;
      }

      dailyRecords.sort((a, b) => a.time.localeCompare(b.time));
      container.innerHTML = "";

      dailyRecords.forEach(item => {
        totalCal += item.calories;
        totalProt += item.protein;

        const card = document.createElement("div");
        card.className = "timeline-card";
        card.innerHTML = `
          <div class="card-header">
            <span class="card-time">${item.time}</span>
            <span class="badge">Verified AI</span>
          </div>
          <div class="card-raw">"${item.rawInput}"</div>
          <div class="card-parsed">${item.parsedDesc}</div>
          <div class="card-macros">
            <span>Energy: <strong>${item.calories} kcal</strong></span>
            <span>Protein: <strong>${item.protein}g</strong></span>
          </div>
          <button class="btn-delete" onclick="deleteMeal(${item.rowIdx})">Delete</button>
        `;
        container.appendChild(card);
      });

      document.getElementById("dayCalories").textContent = totalCal;
      document.getElementById("dayProtein").textContent = totalProt.toFixed(1);
    }
  </script>
</body>
</html>
